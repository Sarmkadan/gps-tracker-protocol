version: '3.8'

services:
  gps-tracker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gps-tracker-protocol
    ports:
      - "5000:5000"     # TCP listener
      - "5001:5001"     # UDP listener
    environment:
      - GPS_PROTOCOL_DEFAULT=GT06
      - GPS_MAX_DEVICES=10000
      - GPS_CACHE_EXPIRATION=60
      - GPS_LOG_LEVEL=Information
      - GPS_RATE_LIMIT=1000
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - gps-network
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: gps-tracker-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - gps-network
    command: redis-server --appendonly yes

volumes:
  redis-data:

networks:
  gps-network:
    driver: bridge
