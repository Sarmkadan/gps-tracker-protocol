version: '3.8'

services:
  gps-tracker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gps-tracker-protocol
    ports:
      - "5000:5000"     # TCP listener
      - "5001:5001"     # UDP listener
      - "8080:8080"     # Health check
    environment:
      - GPS_PROTOCOL_DEFAULT=GT06
      - GPS_MAX_DEVICES=10000
      - GPS_CACHE_EXPIRATION=60
      - GPS_LOG_LEVEL=Information
      - GPS_RATE_LIMIT=1000
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - gps-network
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: gps-tracker-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - gps-network
    command: redis-server --appendonly yes

  # Optional: Prometheus for metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: gps-tracker-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    restart: unless-stopped
    networks:
      - gps-network
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  # Optional: Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: gps-tracker-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ADMIN_USER=admin
    volumes:
      - grafana-data:/var/lib/grafana
    restart: unless-stopped
    networks:
      - gps-network
    depends_on:
      - prometheus

volumes:
  redis-data:
  prometheus-data:
  grafana-data:

networks:
  gps-network:
    driver: bridge
